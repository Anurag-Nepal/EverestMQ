name: Publish artifacts to GitHub Packages

on:
  push:
    branches:
      - main

jobs:
  publish:
    # Prevent infinite loop from auto-commit
    if: "!contains(github.event.head_commit.message, 'Auto version bump')"

    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'   # better than adopt (AdoptOpenJDK is deprecated)

      - name: Bump Maven version
        run: |
          mvn build-helper:parse-version versions:set \
            -DnewVersion=\${parsedVersion.majorVersion}.\${parsedVersion.minorVersion}.\${parsedVersion.nextIncrementalVersion} \
            versions:commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "Bump version to next incremental"
          git push origin main

      # 📦 Publish
      - name: Publish package
        run: mvn --batch-mode deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
