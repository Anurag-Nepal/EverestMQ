# --- Network Configuration ---
broker.port=9876
broker.worker.threads=4
broker.request.timeout.ms=5000

# --- Storage Configuration ---
broker.data.dir=everestmq-data
broker.log.flush.interval.ms=1000

# --- Logging Configuration (Unified) ---
# Available levels: INFO, DEBUG, WARN, ERROR, TRACE
broker.log.level=INFO
# Visual Format: SIMPLE or DETAILED
broker.log.format=SIMPLE
# Custom message prefix (e.g., [EverestMQ])
broker.log.prefix=[EverestMQ]

# Advanced Logging: per-module levels
# Format: logging.level.<package>=<LEVEL>
logging.level.com.everestmq=DEBUG
logging.level.io.netty=WARN

