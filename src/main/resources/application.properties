# EverestMQ Configuration

# Broker Settings
everestmq.broker.port=9876
everestmq.data.dir=everestmq_data
everestmq.log.flush.interval.ms=100
everestmq.broker.worker.threads=4

# Consumer Settings
everestmq.consumer.poll.timeout.ms=500
everestmq.consumer.batch.size=10
everestmq.consumer.offset.auto.commit=true

# Producer Settings
everestmq.producer.retry.count=3
everestmq.producer.retry.backoff.ms=100

# Logging Settings
logging.level.com.everestmq=INFO
logging.level.io.netty=WARN
